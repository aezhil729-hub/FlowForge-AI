<!doctype html>
<html>
  <head>
    <title>FlowForge AI Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="layout">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <h2>⚡ FlowForge</h2>

        <div class="menu">
          <p>📊 Dashboard</p>
          <p>⚙️ Workflows</p>
          <p>🚀 Runs</p>
          <p>🧠 AI Builder</p>
        </div>
      </div>

      <!-- MAIN -->
      <div class="main">
        <!-- AI INPUT -->
        <div class="ai-box">
          <h1>AI Workflow Builder</h1>

          <textarea
            id="prompt"
            placeholder="Describe automation... (e.g. When form submitted, send email and notify Discord)"
          >
          </textarea>

          <button onclick="generateWorkflow()">Generate Workflow</button>

          <div id="loading"></div>
        </div>

        <!-- WORKFLOW VISUAL -->
        <div class="workflow-box">
          <h2>Workflow</h2>
          <div id="workflow"></div>
        </div>

        <!-- LOGS -->
        <div class="log-box">
          <h2>Execution Logs</h2>
          <pre id="logs"></pre>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
